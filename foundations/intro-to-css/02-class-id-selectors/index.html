<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="odd">Number 1 - I'm a class!</p>
    <!-- use of german numbering for id naming -->
    <div id="even-eins">Number 2 - I'm one ID.</div>
    <p class="odd bold">Number 3 - I'm a class, but cooler!</p>
    <!-- use of german numbering for id naming II -->
    <div id="even-zwei">Number 4 - I'm another ID.</div>
    <p class="odd">Number 5 - I'm a class!</p>
  </body>
</html>
